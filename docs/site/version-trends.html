<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven Central — Version Trends</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  p#status { color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.25rem; }
  p#sub { color: #475569; font-size: 0.8rem; margin-bottom: 1rem; }
  .chart-wrap { position: relative; width: 100%; max-width: 1200px; margin: 0 auto; }
  #chart { width: 100%; height: 550px; }
  .summary { max-width: 1200px; margin: 1.5rem auto 0; display: flex; gap: 1rem; flex-wrap: wrap; }
  .stat-card {
    background: #1e293b; border-radius: 8px; padding: 0.8rem 1.2rem; flex: 1; min-width: 150px;
  }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; }
  .stat-card .value.blue { color: #3b82f6; }
  .stat-card .value.green { color: #10b981; }
  .stat-card .value.amber { color: #f59e0b; }
  .stat-card .label { font-size: 0.8rem; color: #64748b; }
  #detail-panel {
    margin-top: 1.5rem; max-width: 1200px; margin-left: auto; margin-right: auto;
    display: none;
  }
  #detail-panel h2 { font-size: 1.1rem; margin-bottom: 0.75rem; }
  #detail-panel .close { float: right; cursor: pointer; color: #94a3b8; font-size: 1.2rem; }
  #detail-panel .close:hover { color: #e2e8f0; }
  .detail-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 0.5rem; }
  .detail-item {
    background: #1e293b; border: 1px solid #334155; border-radius: 8px;
    padding: 0.6rem 0.8rem; display: flex; flex-direction: column; gap: 0.2rem;
    transition: border-color 0.15s;
  }
  .detail-item:hover { border-color: #3b82f6; }
  .detail-item .top { display: flex; justify-content: space-between; align-items: center; }
  .detail-item .name {
    color: #e2e8f0; font-weight: 600; font-size: 0.85rem;
    text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .detail-item .name:hover { color: #3b82f6; }
  .detail-item .count { color: #10b981; font-size: 0.8rem; font-weight: 600; white-space: nowrap; margin-left: 0.5rem; }
  .detail-item .meta { font-size: 0.75rem; color: #94a3b8; }
  .detail-item .badges { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .detail-item .badge {
    display: inline-block; font-size: 0.7rem; padding: 1px 6px;
    border-radius: 3px; background: #334155; color: #94a3b8;
  }
  .detail-item .badge.license { background: #1e3a5f; color: #60a5fa; }
</style>
</head>
<body>
<div class="chart-wrap">
  <h1>Version Publishes Per Month — All Groups</h1>
  <p id="status">Loading enrichment data...</p>
  <p id="sub">Versions published each month across all groups, from deps.dev enrichment. Click any bar for details.</p>
  <div id="chart"></div>
</div>
<div class="summary" id="summary"></div>
<div id="detail-panel">
  <span class="close" onclick="document.getElementById('detail-panel').style.display='none'">&times;</span>
  <h2 id="detail-title"></h2>
  <div id="detail-list" class="detail-list"></div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'), 'dark');

const milestones = [
  { month: '2022-06', label: 'Copilot GA', color: '#06b6d4' },
  { month: '2023-03', label: 'GPT-4', color: '#f59e0b' },
  { month: '2024-03', label: 'Claude 3 / Devin', color: '#8b5cf6' },
  { month: '2024-06', label: 'Sonnet 3.5', color: '#8b5cf6' },
  { month: '2024-08', label: 'Cursor AI', color: '#06b6d4' },
  { month: '2025-02', label: 'Sonnet 3.7', color: '#8b5cf6' },
  { month: '2025-05', label: 'Claude 4', color: '#8b5cf6' },
  { month: '2025-11', label: 'Opus 4.5 / CC', color: '#8b5cf6' },
  { month: '2026-03', label: 'Opus 4.6', color: '#8b5cf6' },
];

function showDetail(month) {
  fetch('/api/new-groups-details-' + month + '.json')
    .then(r => r.json())
    .then(groups => {
      if (!groups || groups.length === 0) return;
      groups.sort((a, b) => (b.total_versions || 0) - (a.total_versions || 0));
      const totalVer = groups.reduce((s, g) => s + (g.total_versions || 0), 0);
      document.getElementById('detail-title').textContent =
        month + ' — ' + groups.length + ' groups, ' + totalVer.toLocaleString() + ' versions';
      document.getElementById('detail-list').innerHTML = groups.map(g => {
        const ns = g.group_id.replace(/\./g, '/');
        const url = 'https://repo1.maven.org/maven2/' + ns + '/';
        const badges = [];
        if (g.license) badges.push('<span class="badge license">' + g.license + '</span>');
        if (g.total_versions > 0) badges.push('<span class="badge">' + g.total_versions + ' versions</span>');
        if (g.artifact_count > 0) badges.push('<span class="badge">' + g.artifact_count + ' artifacts</span>');
        return '<div class="detail-item">' +
          '<div class="top"><a class="name" href="' + url + '" target="_blank">' + g.group_id + '</a>' +
          '<span class="count">' + (g.total_versions || 0) + ' ver</span></div>' +
          (badges.length ? '<div class="badges">' + badges.join('') + '</div>' : '') +
          '<div class="meta">' + g.first_artifact + ' — ' + g.first_published + '</div>' +
          '</div>';
      }).join('');
      document.getElementById('detail-panel').style.display = 'block';
      document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth' });
    });
}

chart.on('click', function(params) {
  if (params.componentType === 'series' && params.seriesType === 'bar') {
    showDetail(params.name);
  }
});

function update() {
  fetch('/api/version-trends.json')
    .then(r => {
      if (r.status === 503) throw new Error('not ready');
      return r.json();
    })
    .then(data => {
      if (!data || data.length === 0) throw new Error('empty');

      const months = data.map(d => d.month);
      const newVer = data.map(d => d.new_groups);

      // 3-month moving average
      const window = 3;
      const trend = newVer.map((v, i) => {
        if (i < window - 1) return null;
        let sum = 0;
        for (let j = i - window + 1; j <= i; j++) sum += newVer[j];
        return Math.round(sum / window);
      });

      const markLines = milestones
        .filter(m => months.includes(m.month))
        .map((m, i) => ({
          xAxis: m.month,
          label: {
            formatter: m.label, position: 'end', rotate: 0,
            fontSize: 10, fontWeight: 'bold', color: m.color,
            backgroundColor: '#0f172a', padding: [2, 4], borderRadius: 3,
            offset: [0, (i % 3) * 14],
          },
          lineStyle: { color: m.color, type: 'dashed', width: 1, opacity: 0.4 },
        }));

      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          formatter: params => {
            let html = params[0].name;
            params.forEach(p => {
              if (p.value != null) html += '<br/>' + p.marker + ' ' + p.seriesName + ': ' + p.value.toLocaleString();
            });
            return html;
          },
        },
        legend: {
          show: true, top: 5, right: 20,
          textStyle: { color: '#94a3b8', fontSize: 11 },
        },
        xAxis: {
          type: 'category', data: months,
          axisLabel: { rotate: 45, color: '#64748b', fontSize: 11 },
          axisLine: { lineStyle: { color: '#1e293b' } },
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#64748b' },
          splitLine: { lineStyle: { color: '#1e293b' } },
        },
        series: [{
          name: 'New versions',
          type: 'bar',
          data: newVer,
          itemStyle: { color: '#10b981' },
          markLine: { symbol: 'none', data: markLines, silent: true },
          barMaxWidth: 30,
        }, {
          name: '3-month trend',
          type: 'line',
          data: trend,
          smooth: true,
          symbol: 'none',
          lineStyle: { color: '#f59e0b', width: 2 },
          z: 10,
        }],
        grid: { top: 50, bottom: 60, left: 50, right: 20 },
      });

      const total = newVer.reduce((s, v) => s + v, 0);
      const recent6 = data.slice(-6);
      const avgNew = Math.round(recent6.reduce((s, d) => s + d.new_groups, 0) / recent6.length);

      document.getElementById('status').textContent =
        total.toLocaleString() + ' versions tracked';
      document.getElementById('summary').innerHTML =
        '<div class="stat-card"><div class="value green">' + total.toLocaleString() + '</div><div class="label">Total versions</div></div>' +
        '<div class="stat-card"><div class="value amber">' + avgNew.toLocaleString() + '</div><div class="label">Avg new/month (6m)</div></div>' +
        '<div class="stat-card"><div class="value blue">' + newVer[newVer.length - 1].toLocaleString() + '</div><div class="label">Last month</div></div>';

      ;
    })
    .catch(() => {
      document.getElementById('status').textContent = 'Waiting for enrichment data...';
      ;
    });
}

update();
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
