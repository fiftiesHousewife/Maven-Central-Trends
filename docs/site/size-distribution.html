<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maven Central — Group Size Distribution</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  p#status { color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.25rem; }
  p#sub { color: #475569; font-size: 0.8rem; margin-bottom: 1rem; }
  .chart-wrap { position: relative; width: 100%; max-width: 1200px; margin: 0 auto; }
  #chart { width: 100%; height: 550px; }
  .summary { max-width: 1200px; margin: 1.5rem auto 0; display: flex; gap: 1rem; flex-wrap: wrap; }
  .stat-card {
    background: #1e293b; border-radius: 8px; padding: 0.8rem 1.2rem; flex: 1; min-width: 150px;
  }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; }
  .stat-card .value.red { color: #ef4444; }
  .stat-card .value.blue { color: #3b82f6; }
  .stat-card .value.green { color: #10b981; }
  .stat-card .value.amber { color: #f59e0b; }
  .stat-card .label { font-size: 0.8rem; color: #64748b; }
</style>
</head>
<body>
<div class="chart-wrap">
  <h1>Group Size Distribution Over Time</h1>
  <p id="status">Loading data...</p>
  <p id="sub">How many artifacts does each group contain? Stacked bars show the mix of single-artifact, small (2-5), medium (6-50), and large (50+) groups per month.</p>
  <div id="chart"></div>
</div>
<div class="summary" id="summary"></div>
<div id="detail-panel" style="display:none; margin-top:1.5rem; max-width:1200px; margin-left:auto; margin-right:auto;">
  <span style="float:right;cursor:pointer;color:#94a3b8;font-size:1.2rem" onclick="document.getElementById('detail-panel').style.display='none'">&times;</span>
  <h2 id="detail-title" style="font-size:1.1rem;margin-bottom:0.75rem"></h2>
  <div id="detail-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:0.5rem"></div>
</div>
<script>
const chart = echarts.init(document.getElementById('chart'), 'dark');

function showDetail(month) {
  fetch('/api/new-groups-details-' + month + '.json')
    .then(r => r.json())
    .then(groups => {
      if (!groups) return;
      groups.sort((a, b) => (b.artifact_count || 0) - (a.artifact_count || 0));
      document.getElementById('detail-title').textContent =
        month + ' — ' + groups.length + ' groups by artifact count';
      document.getElementById('detail-list').innerHTML = groups.map(g => {
        const ns = g.group_id.replace(/\./g, '/');
        const url = 'https://repo1.maven.org/maven2/' + ns + '/';
        return '<div style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:0.6rem 0.8rem">' +
          '<div style="display:flex;justify-content:space-between"><a href="' + url + '" target="_blank" style="color:#e2e8f0;font-weight:600;font-size:0.85rem;text-decoration:none">' + g.group_id + '</a>' +
          '<span style="color:#3b82f6;font-size:0.8rem;font-weight:600">' + (g.artifact_count || 0) + ' art</span></div></div>';
      }).join('');
      document.getElementById('detail-panel').style.display = 'block';
      document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth' });
    });
}

chart.on('click', function(params) {
  if (params.componentType === 'series') showDetail(params.name);
});

const milestones = [
  { month: '2022-06', label: 'Copilot GA', color: '#06b6d4' },
  { month: '2023-03', label: 'GPT-4', color: '#f59e0b' },
  { month: '2024-03', label: 'Claude 3 / Devin', color: '#8b5cf6' },
  { month: '2024-08', label: 'Cursor AI', color: '#06b6d4' },
  { month: '2025-05', label: 'Claude 4', color: '#8b5cf6' },
  { month: '2025-11', label: 'Opus 4.5 / CC', color: '#8b5cf6' },
  { month: '2026-03', label: 'Opus 4.6', color: '#8b5cf6' },
];

function update() {
  fetch('/api/size-distribution.json')
    .then(r => {
      if (r.status === 503) throw new Error('not ready');
      return r.json();
    })
    .then(data => {
      if (!data || !data.by_month || data.by_month.length === 0) throw new Error('empty');

      const byMonth = data.by_month;
      const months = byMonth.map(d => d.month);

      const markLines = milestones
        .filter(m => months.includes(m.month))
        .map((m, i) => ({
          xAxis: m.month,
          label: {
            formatter: m.label, position: 'end', rotate: 0,
            fontSize: 10, fontWeight: 'bold', color: m.color,
            backgroundColor: '#0f172a', padding: [2, 4], borderRadius: 3,
            offset: [0, (i % 3) * 14],
          },
          lineStyle: { color: m.color, type: 'dashed', width: 1, opacity: 0.4 },
        }));

      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
        },
        legend: {
          show: true, top: 5, right: 20,
          textStyle: { color: '#94a3b8', fontSize: 11 },
        },
        xAxis: {
          type: 'category', data: months,
          axisLabel: { rotate: 45, color: '#64748b', fontSize: 11 },
          axisLine: { lineStyle: { color: '#1e293b' } },
        },
        yAxis: {
          type: 'value',
          axisLabel: { color: '#64748b' },
          splitLine: { lineStyle: { color: '#1e293b' } },
        },
        series: [{
          name: '1 artifact',
          type: 'bar',
          stack: 'size',
          data: byMonth.map(d => d.single),
          itemStyle: { color: '#ef4444' },
          markLine: { symbol: 'none', data: markLines, silent: true },
          barMaxWidth: 30,
        }, {
          name: '2-5 artifacts',
          type: 'bar',
          stack: 'size',
          data: byMonth.map(d => d.small),
          itemStyle: { color: '#f59e0b' },
          barMaxWidth: 30,
        }, {
          name: '6-50 artifacts',
          type: 'bar',
          stack: 'size',
          data: byMonth.map(d => d.medium),
          itemStyle: { color: '#3b82f6' },
          barMaxWidth: 30,
        }, {
          name: '50+ artifacts',
          type: 'bar',
          stack: 'size',
          data: byMonth.map(d => d.large),
          itemStyle: { color: '#10b981' },
          barMaxWidth: 30,
        }],
        grid: { top: 50, bottom: 60, left: 50, right: 20 },
      });

      // Summary from overall distribution
      const overall = data.overall || [];
      const totalGroups = overall.reduce((s, d) => s + d.count, 0);
      const singleArt = overall.find(d => d.bucket === '1');
      const singlePct = singleArt && totalGroups > 0 ? Math.round(singleArt.count / totalGroups * 100) : 0;

      document.getElementById('status').textContent =
        totalGroups.toLocaleString() + ' groups with artifacts';
      document.getElementById('summary').innerHTML = overall.map(d => {
        const pct = totalGroups > 0 ? Math.round(d.count / totalGroups * 100) : 0;
        const colors = { '1': 'red', '2-5': 'amber', '6-10': 'blue', '11-50': 'blue', '51-200': 'green', '200+': 'green' };
        return '<div class="stat-card"><div class="value ' + (colors[d.bucket] || 'blue') + '">' + d.count.toLocaleString() + '</div><div class="label">' + d.bucket + ' artifacts (' + pct + '%)</div></div>';
      }).join('');

      ;
    })
    .catch(() => {
      document.getElementById('status').textContent = 'Waiting for data...';
      ;
    });
}

update();
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
